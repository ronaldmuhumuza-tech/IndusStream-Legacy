name: Deploy Lambda DEV

on:
  push:
    branches:
      - v4-ci-cd-automation

    paths:
      - "v4-automated-telemetry-platform/lambda/**"
      - ".github/workflows/deploy-lambda-dev.yml"

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip Lambda code
        run: |
          cd v4-automated-telemetry-platform/lambda
          zip -r lambda.zip .

      - name: Configure DEV AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.DEV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.DEV_AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Deploy Lambda to DEV
        run: |
          aws lambda update-function-code \
            --function-name indusstream_process_telemetry_dev \
            --zip-file fileb://v4-automated-telemetry-platform/lambda/lambda.zip